stages:
  - test
  - build
  - upload

variables:
  REGISTRY_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/vpet/${CI_COMMIT_SHORT_SHA}"
  GO_VERSION: "1.26.3"


test_job:
  stage: test
  image: golang:${GO_VERSION}-alpine
  script:
    - go test ./src/...

build_job:
  stage: build
  image: golang:${GO_VERSION}-alpine

  before_script:
    - apk add --no-cache git coreutils

  script:
    #  LINUX for COMPILE
    - GOOS=linux GOARCH=amd64 go build -o build/pet_linux ./src

    #  LINUX for COMPILE (ARM)
    - GOOS=linux GOARCH=arm64 go build -o build/pet_linux_arm64 ./src

    #  WINDOWS for COMPILE (.exe)
    - GOOS=windows GOARCH=amd64 go build -o build/pet_windows.exe ./src

    #  macOS for COMPILE (Intel CPUs)
    - GOOS=darwin GOARCH=amd64 go build -o build/pet_mac_intel ./src

    #  macOS for COMPILE (Apple Silicon - M1/M2/M3 CPUs)
    - GOOS=darwin GOARCH=arm64 go build -o build/pet_mac_arm64 ./src

  artifacts:
    name: "vpet-builds-$CI_COMMIT_REF_NAME"
    expire_in: 30 days
    paths:
      - build/

upload_to_registry:
  stage: upload
  image: curlimages/curl:latest
  script:
    - 'curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file build/pet_linux "${REGISTRY_URL}/pet_linux"'
    - 'curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file build/pet_linux_arm64 "${REGISTRY_URL}/pet_linux_arm64"'
    - 'curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file build/pet_windows.exe "${REGISTRY_URL}/pet_windows.exe"'
    - 'curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file build/pet_mac_intel "${REGISTRY_URL}/pet_mac_intel"'
    - 'curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file build/pet_mac_arm64 "${REGISTRY_URL}/pet_mac_arm64"'